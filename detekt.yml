build:
  maxIssues: 0

style:
  MaxLineLength:
    maxLineLength: 140
  ReturnCount:
    max: 10
  WildcardImport:
    excludeImports:
      - com.intellij.ui.dsl.builder.*
      - org.junit.jupiter.api.Assertions.*
      - java.util.*
  MagicNumber:
    active: false

complexity:
  LongMethod:
    threshold: 120
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 20
  CyclomaticComplexMethod:
    threshold: 15

exceptions:
  TooGenericExceptionCaught:
    active: false
